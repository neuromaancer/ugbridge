  <rect width="1200" height="630" fill="#f1f5f9"/>

  <g class="ui">
    <g transform="translate(56 32)">
      <rect width="40" height="40" rx="12" fill="#4f46e5"/>
      <svg x="10" y="10" width="20" height="20" color="#ffffff"><use href="#icon-languages"/></svg>
      <text x="53" y="29" fill="#020617" font-size="31" font-weight="800">UG Bridge</text>

      <text x="0" y="65" fill="#334155" font-size="15.5">
        <tspan x="0" dy="0">Convert between UEY (Uyghur Arabic script)</tspan>
        <tspan x="0" dy="24">and ULY (Uyghur Latin alphabet), search</tspan>
        <tspan x="0" dy="24">dictionary data, and study Uyghur script.</tspan>
      </text>
    </g>

    <g transform="translate(912 34)">
      <rect width="124" height="38" rx="19" fill="#ffffff" stroke="#d7dee8" filter="url(#card-shadow)"/>
      <rect x="4" y="4" width="37" height="30" rx="15" fill="#4f46e5"/>
      <svg x="14.5" y="11" width="16" height="16" color="#ffffff"><use href="#icon-monitor"/></svg>
      <svg x="58" y="11" width="16" height="16" color="#64748b"><use href="#icon-sun"/></svg>
      <svg x="96" y="11" width="16" height="16" color="#64748b"><use href="#icon-moon"/></svg>
    </g>

    <g transform="translate(1046 34)">
      <rect width="98" height="38" rx="19" fill="#ffffff" stroke="#d7dee8" filter="url(#card-shadow)"/>
      <svg x="14" y="11" width="16" height="16" color="#334155"><use href="#icon-github"/></svg>
      <text x="39" y="25" fill="#334155" font-size="14" font-weight="700">GitHub</text>
    </g>

    <g transform="translate(440 84)">
      <rect width="704" height="46" rx="23" fill="#ffffff" stroke="#d7dee8" filter="url(#card-shadow)"/>
      <g color="#334155" font-size="15" font-weight="700">
        <svg x="36" y="15" width="16" height="16"><use href="#icon-languages"/></svg>
        <text x="58" y="28">Convert</text>
        <svg x="167" y="15" width="16" height="16"><use href="#icon-graduation"/></svg>
        <text x="189" y="28">Learn UEY</text>
        <svg x="326" y="15" width="16" height="16"><use href="#icon-list-checks"/></svg>
        <text x="348" y="28">Quiz</text>
        <svg x="448" y="15" width="16" height="16"><use href="#icon-book"/></svg>
        <text x="470" y="28">Alphabet</text>
        <svg x="582" y="15" width="16" height="16"><use href="#icon-search"/></svg>
        <text x="604" y="28">Dictionary</text>
      </g>
    </g>

    <line x1="56" y1="172" x2="1144" y2="172" stroke="#dbe4f0"/>

    <g transform="translate(56 198)">
      <rect width="98" height="36" rx="18" fill="#ffffff" stroke="#d7dee8" filter="url(#card-shadow)"/>
      <svg x="16" y="10" width="16" height="16" color="#475569"><use href="#icon-home"/></svg>
      <text x="40" y="23" fill="#334155" font-size="15" font-weight="700">Home</text>
    </g>

    <g transform="translate(1056 198)">
      <rect width="88" height="36" rx="18" fill="#ffffff" stroke="#d7dee8" filter="url(#card-shadow)"/>
      <svg x="16" y="10" width="16" height="16" color="#334155"><use href="#icon-share"/></svg>
      <text x="38" y="23" fill="#334155" font-size="15" font-weight="500">Share</text>
    </g>

    <g transform="translate(56 269)">
      <text x="0" y="10" fill="#4f46e5" font-size="14" font-weight="800" letter-spacing="6">UYGHUR SCRIPT WORKSPACE</text>
      <text x="0" y="59" fill="#020617" font-size="35" font-weight="800">
        <tspan x="0" dy="0">Convert, search, and study</tspan>
        <tspan x="0" dy="40">Uyghur across UEY and ULY.</tspan>
      </text>
      <text x="0" y="139" fill="#334155" font-size="16.5">
        <tspan x="0" dy="0">UEY is the Uyghur Arabic-script writing system. ULY is Uyghur</tspan>
        <tspan x="0" dy="28">written with the Latin alphabet. UG Bridge keeps both forms visible</tspan>
        <tspan x="0" dy="28">for conversion, dictionary lookup, alphabet study, and IPA hints.</tspan>
      </text>
    </g>

    <g transform="translate(56 493)">
      <rect width="289" height="89" rx="6" fill="#ffffff" stroke="#d7dee8"/>
      <text x="12" y="23" fill="#020617" font-size="14.5" font-weight="800">UEY</text>
      <text x="12" y="49" fill="#475569" font-size="15">
        <tspan x="12" dy="0">Uyghur Ereb Yéziqi, the Arabic-based</tspan>
        <tspan x="12" dy="24">script commonly used for Uyghur.</tspan>
      </text>

      <g transform="translate(299 0)">
        <rect width="289" height="89" rx="6" fill="#ffffff" stroke="#d7dee8"/>
        <text x="12" y="23" fill="#020617" font-size="14.5" font-weight="800">ULY</text>
        <text x="12" y="49" fill="#475569" font-size="15">
          <tspan x="12" dy="0">Uyghur Latin Yéziqi, a Latin-alphabet</tspan>
          <tspan x="12" dy="24">writing system for Uyghur.</tspan>
        </text>
      </g>
    </g>

    <g transform="translate(56 602)">
      <rect width="171" height="40" rx="6" fill="#4f46e5"/>
      <text x="16" y="25" fill="#ffffff" font-size="14" font-weight="700">Start converting</text>
      <svg x="140" y="12" width="16" height="16" color="#ffffff"><use href="#icon-arrow"/></svg>
      <rect x="183" width="160" height="40" rx="20" fill="#ffffff" stroke="#d7dee8"/>
      <svg x="198" y="12" width="16" height="16" color="#334155"><use href="#icon-search"/></svg>
      <text x="222" y="25" fill="#334155" font-size="14" font-weight="500">Search dictionary</text>
    </g>

    <g transform="translate(662 263)">
      <rect width="482" height="392" rx="8" fill="#ffffff" stroke="#d7dee8"/>
      <g transform="translate(16 16)">
        <rect width="114" height="25" rx="12.5" fill="#eef2ff"/>
        <svg x="12" y="5" width="15" height="15" color="#4f46e5"><use href="#icon-sparkles"/></svg>
        <text x="36" y="17" fill="#4f46e5" font-size="13" font-weight="800">Live bridge</text>

        <rect x="336" width="113" height="25" rx="12.5" fill="#f1f5f9"/>
        <svg x="348" y="5" width="15" height="15" color="#475569"><use href="#icon-wifi-off"/></svg>
        <text x="371" y="17" fill="#334155" font-size="13" font-weight="800">Offline core</text>
      </g>

      <g transform="translate(16 56)">
        <rect width="450" height="108" rx="6" fill="#f8fafc" stroke="#d7dee8"/>
        <text x="14" y="25" fill="#64748b" font-size="13" font-weight="800">UEY</text>
        <svg x="418" y="18" width="16" height="16" color="#4f46e5"><use href="#icon-languages"/></svg>
        <text x="435" y="83" fill="#020617" font-size="37" font-weight="700" text-anchor="end" class="ug">ئۇيغۇرچە يېزىق</text>
      </g>

      <g transform="translate(16 176)">
        <rect width="209" height="74" rx="6" fill="#ffffff" stroke="#d7dee8"/>
        <text x="13" y="26" fill="#94a3b8" font-size="12" font-weight="800">ULY</text>
        <text x="13" y="51" fill="#4f46e5" font-size="17" font-weight="800" class="mono">uyghurche yéziq</text>

        <svg x="216" y="29" width="20" height="20" color="#4f46e5"><use href="#icon-arrow"/></svg>

        <rect x="242" width="208" height="74" rx="6" fill="#ffffff" stroke="#d7dee8"/>
        <text x="255" y="26" fill="#94a3b8" font-size="12" font-weight="800">IPA</text>
        <text x="255" y="51" fill="#059669" font-size="16" font-weight="800" class="mono">/jɑχʃimusiz/</text>
      </g>

      <g transform="translate(16 260)" fill="#020617" font-size="27" text-anchor="middle" class="ug">
        <rect width="109" height="50" rx="6" fill="#ffffff" stroke="#d7dee8"/>
        <rect x="114" width="109" height="50" rx="6" fill="#ffffff" stroke="#d7dee8"/>
        <rect x="228" width="109" height="50" rx="6" fill="#ffffff" stroke="#d7dee8"/>
        <rect x="342" width="108" height="50" rx="6" fill="#ffffff" stroke="#d7dee8"/>
        <rect y="55" width="109" height="50" rx="6" fill="#ffffff" stroke="#d7dee8"/>
        <rect x="114" y="55" width="109" height="50" rx="6" fill="#ffffff" stroke="#d7dee8"/>
        <rect x="228" y="55" width="109" height="50" rx="6" fill="#ffffff" stroke="#d7dee8"/>
        <rect x="342" y="55" width="108" height="50" rx="6" fill="#ffffff" stroke="#d7dee8"/>
        <text x="54.5" y="34">ئا</text>
        <text x="168.5" y="34">ب</text>
        <text x="282.5" y="34">چ</text>
        <text x="396" y="34">غ</text>
        <text x="54.5" y="89">ق</text>
        <text x="168.5" y="89">ڭ</text>
        <text x="282.5" y="89">ئې</text>
        <text x="396" y="89">ي</text>
      </g>
    </g>
  </g>
</svg>
