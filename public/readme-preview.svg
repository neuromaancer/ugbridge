<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">UG Bridge home screen preview</title>
  <desc id="desc">The UG Bridge home screen with the header, workspace tabs, hero copy, script glossary, and live bridge preview.</desc>
  <defs>
    <filter id="card-shadow" x="-8%" y="-10%" width="116%" height="126%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <style>
      .ui { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: Menlo, Consolas, "Liberation Mono", monospace; }
      .ug { font-family: "Noto Naskh Arabic", "Amiri", "Times New Roman", serif; }
      .icon { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .github { fill: currentColor; }
    </style>
    <symbol id="icon-languages" viewBox="0 0 24 24">
      <path class="icon" d="m5 8 6 6"/>
      <path class="icon" d="m4 14 6-6 2-3"/>
      <path class="icon" d="M2 5h12"/>
      <path class="icon" d="M7 2h1"/>
      <path class="icon" d="m22 22-5-10-5 10"/>
      <path class="icon" d="M14 18h6"/>
    </symbol>
    <symbol id="icon-home" viewBox="0 0 24 24">
      <path class="icon" d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
      <path class="icon" d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    </symbol>
    <symbol id="icon-monitor" viewBox="0 0 24 24">
      <rect class="icon" width="20" height="14" x="2" y="3" rx="2"/>
      <path class="icon" d="M8 21h8"/>
      <path class="icon" d="M12 17v4"/>
    </symbol>
    <symbol id="icon-sun" viewBox="0 0 24 24">
      <circle class="icon" cx="12" cy="12" r="4"/>
      <path class="icon" d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
    </symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24">
      <path class="icon" d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/>
    </symbol>
    <symbol id="icon-search" viewBox="0 0 24 24">
      <path class="icon" d="m21 21-4.34-4.34"/>
      <circle class="icon" cx="11" cy="11" r="8"/>
    </symbol>
    <symbol id="icon-share" viewBox="0 0 24 24">
      <circle class="icon" cx="18" cy="5" r="3"/>
      <circle class="icon" cx="6" cy="12" r="3"/>
      <circle class="icon" cx="18" cy="19" r="3"/>
      <path class="icon" d="M8.59 13.51l6.83 3.98M15.41 6.51 8.59 10.49"/>
    </symbol>
    <symbol id="icon-graduation" viewBox="0 0 24 24">
      <path class="icon" d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/>
      <path class="icon" d="M22 10v6M6 12.5V16a6 3 0 0 0 12 0v-3.5"/>
    </symbol>
    <symbol id="icon-list-checks" viewBox="0 0 24 24">
      <path class="icon" d="M13 5h8M13 12h8M13 19h8M3 17l2 2 4-4M3 7l2 2 4-4"/>
    </symbol>
    <symbol id="icon-book" viewBox="0 0 24 24">
